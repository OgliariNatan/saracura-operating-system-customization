# Preseed configuration for automated installation of Saracura OS

# Locale settings
d-i debian-installer/locale string pt_BR.UTF-8
d-i console-setup/layoutcode string br
d-i console-setup/modelcode string br

# Network settings
d-i netcfg/get_hostname string saracura
d-i netcfg/get_domain string localdomain

# Timezone
d-i time/zone string America/Sao_Paulo

# Keyboard layout
d-i keyboard-configuration/xkb-keymap select br

# Partitioning
d-i partman-auto/method string regular
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Users
d-i passwd/user-fullname string Usuário
d-i passwd/username string usuario
d-i passwd/user-password-crypted password $6$rounds=4096$saltsalt$hashedpassword

# Package selection
tasksel tasksel/first multiselect standard, kubuntu-desktop

# Install additional packages
d-i pkgsel/include string wget curl net-tools htop openssh-server kde-full kdeconnect sddm tuxpaint vlc gimp anydesk google-chrome-stable onlyoffice-desktopeditors printer-driver-all foomatic-db-engine hp-ppd openprinting-ppds default-jre default-jdk zoom

# Finish installation
d-i finish-install/reboot_in_progress note
d-i finish-install/keep-consoles boolean true